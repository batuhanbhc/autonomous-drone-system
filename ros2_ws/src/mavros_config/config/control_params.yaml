drone_id: 0

flight_params:
  takeoff_m: 2.0
  gcs_failsafe_s: 10  # last gcs heartbeat > "gcs_failsafe_s" triggers failsafe state
  failsafe_watchdog_hz: 2.0
  logs_path: "/home/batuhan/shared/recordings"


camera:
  device_path: "/dev/video0"
  width: 800
  height: 600
  fps: 30
  gimbal_pitch_angle: 15.0  # degrees, positive downwards
  
vision_pipeline:
  obj_det_hef_path: "/person_detector.hef"
  obj_det_score_thresh: 0.5
  obj_det_model_input_size: 800   # square input side (px)
  obj_det_person_class_idx: 0     # person class index
  
  camera_intrinsics:
    fx: 794.8507417999692
    fy: 793.1434009233761
    cx: 404.2176325649676
    cy: 303.08905712993436
 
  distortion:
    k1:  0.06077537192297337
    k2: -0.26816775880001076
    p1: -0.0030080382790939816
    p2:  0.0008929689554498755
    k3:  0.11999675679075539

custom_topics:
  images: "camera/image/compressed"
  autonomous_action: "/autonomous/action"
  manual_action:  "/teleop/action"
  manual_command: "/teleop/command" 

mavros_topics:
    state: "/mavros/state"
    battery: "/mavros/battery"
    extended_state: "/mavros/extended_state"
    statustext: "/mavros/statustext/recv"
    odom: "/mavros/local_position/odom"
    gps1_raw: "/mavros/gpsstatus/gps1/raw"

panel:
  refresh_hz: 4.0
  queue_size: 10
  stale_threshold_s: 5.0

  
teleop:
  hz: 8.0
  keyboard_devices: ["/dev/input/by-id/usb-Razer_Razer_Ornata_V3-event-kbd",
                     "/dev/input/by-id/usb-ASUSTek_Computer_Inc._N-KEY_Device-event-mouse"]

  velocity:
    horizontal_default: 1       # m/s
    vertical_default: 0.5       # m/s
    horizontal_increment: 1.0   # m/s per command
    vertical_increment: 0.5     # m/s per command
    horizontal_max: 5.0         # m/s
    vertical_max: 2.0           # m/s
    horizontal_min: 1.0        # m/s
    vertical_min: 0.5          # m/s

  yaw_rate:
    default: 0.5   # rad/s
    min: 0.1
    max: 1.0
    increment: 0.1  # rad/s per command
  
  commands:
    params:
      KILL_SWITCH:
        activation_time_s: 1.0
        latch: true
        kill_window_s: 2.0
      KILL_CONFIRM:
        activation_time_s: 0.0
        latch: true
      CONTROL_TOGGLE:
        activation_time_s: 0.25
        latch: true
      KEYBOARD_TOGGLE:
        activation_time_s: 0.25
        latch: true
      ARM:
        activation_time_s: 1.0
        latch: true
      DISARM:
        activation_time_s: 2.0
        latch: true
      LAND:
        activation_time_s: 0.5
        latch: true
      RTL:
        activation_time_s: 0.5
        latch: true
      TAKEOFF:
        activation_time_s: 1.0
        latch: true
      GUIDED:
        activation_time_s: 0.1
        latch: true
      SPEED_UP_HORIZONTAL:
        latch: true
        activation_time_s: 0.1
      SPEED_DOWN_HORIZONTAL:
        latch: true
        activation_time_s: 0.1
      SPEED_UP_VERTICAL:
        latch: true
        activation_time_s: 0.1
      SPEED_DOWN_VERTICAL:
        latch: true
        activation_time_s: 0.1
      SPEED_UP_YAW:
        latch: true
        activation_time_s: 0.1
      SPEED_DOWN_YAW:
        latch: true
        activation_time_s: 0.1
      VEL_YAW:
        activation_time_s: 0.0
        latch: false
      PRESS_SAFETY_SWITCH:
        activation_time_s: 1.0
        latch: true
      RECORD_VIDEO_TOGGLE:
        activation_time_s: 0.0
        latch: true
      STREAM_TOGGLE:
        activation_time_s: 0.0
        latch: true
